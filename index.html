<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minigame: Di sản UNESCO Việt Nam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #1a1a1a; 
            background-image: radial-gradient(circle at center, #2a2a2a 0%, #111 100%);
            margin: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        
        .font-serif-custom { font-family: 'Playfair Display', serif; }

        .vintage-frame {
            border: 2px solid #D4AF37; outline: 1px solid #D4AF37; outline-offset: -6px; position: relative;
        }
        .vintage-frame::before, .vintage-frame::after, .frame-inner::before, .frame-inner::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid #D4AF37; z-index: 20;
        }
        .vintage-frame::before { top: 2px; left: 2px; border-right: none; border-bottom: none; }
        .vintage-frame::after { bottom: 2px; right: 2px; border-left: none; border-top: none; }
        .frame-inner::before { top: 2px; right: 2px; border-left: none; border-bottom: none; }
        .frame-inner::after { bottom: 2px; left: 2px; border-right: none; border-top: none; }

        #game-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #game-card { transform-origin: center center; flex-shrink: 0; }

        input { font-size: 16px !important; }
        input:focus::placeholder { color: transparent; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-card" class="relative w-full max-w-md aspect-[9/16] rounded-xl overflow-hidden shadow-2xl shadow-yellow-900/20 bg-[#1a1a1a]">
            
            <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('background.jpg');"></div>
            <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/40 to-black/80"></div>

            <div class="absolute inset-3 vintage-frame flex flex-col items-center justify-between p-6 text-center z-10">
                <div class="frame-inner w-full h-full absolute inset-0 pointer-events-none"></div>

                <div class="mt-4 w-full relative z-30 pt-4" id="title-container">
                    <h1 id="title-ele" class="font-serif-custom text-3xl sm:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-yellow-400 to-yellow-200 drop-shadow-md leading-snug">
                        Di sản UNESCO<br>Việt Nam
                    </h1>
                </div>

                <div class="text-3xl sm:text-4xl tracking-[0.4em] my-3 drop-shadow-2xl relative z-30 ml-[0.4em]">🚣‍♂️🌄⛰️</div>

                <div class="bg-black/40 backdrop-blur-md border border-yellow-500/30 rounded-xl p-5 text-left text-sm text-gray-100 w-full max-w-[280px] shadow-xl relative z-30">
                    <ul class="space-y-3">
                        <li class="flex items-start gap-3"><span>📍</span> <span>Ninh Bình</span></li>
                        <li class="flex items-start gap-3"><span>📅</span> <span>Công nhận năm 2014</span></li>
                        <li class="flex items-start gap-3"><span>🚣</span> <span>Chèo thuyền qua hang động</span></li>
                        <li class="flex items-start gap-3"><span class="text-yellow-300">🌿</span> <span class="font-semibold text-yellow-300">Di sản hỗn hợp đầu tiên tại VN</span></li>
                    </ul>
                </div>

                <div class="mb-4 w-full relative z-30 flex flex-col items-center">
                    <div class="h-10 mb-3 flex items-center justify-center">
                        <input type="text" id="mssv-input" maxlength="10" placeholder="Nhập MSSV của bạn" class="w-40 sm:w-48 bg-black/60 border border-yellow-500/50 rounded-lg py-1.5 px-3 text-center text-sm text-white placeholder-gray-400 focus:outline-none focus:border-yellow-400 transition-all shadow-inner tracking-wider">
                    </div>

                    <div class="flex flex-wrap justify-center gap-1.5 mb-2" id="letter-inputs">
                        <div class="flex gap-1">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                        </div>
                        <div class="flex gap-1">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none">
                        </div>
                    </div>
                    
                    <p id="message" class="mt-1 text-xs font-bold min-h-[16px] transition-all opacity-0"></p>

                    <button id="capture-btn" class="hidden mt-2 bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-bold py-2 px-6 rounded-full shadow-lg text-xs uppercase tracking-wider transition-all">📸 Nhận ảnh minh chứng</button>
                </div>

                <div id="mssv-display" class="hidden absolute bottom-6 right-6 z-50 cursor-pointer">
                    <span id="mssv-text" class="text-white text-xs font-bold tracking-widest" style="text-shadow: 2px 2px 4px #000;"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="result-modal" class="hidden fixed inset-0 z-[9999] bg-black/95 backdrop-blur-sm flex flex-col items-center justify-center p-4 transition-opacity">
        <p class="text-yellow-400 text-center font-bold mb-4 text-sm sm:text-base animate-bounce">
            👇 Nhấn giữ vào ảnh bên dưới 2 giây <br> và chọn "Lưu hình ảnh" để tải về máy! 👇
        </p>
        
        <img id="result-image" class="max-h-[70vh] max-w-full rounded-lg shadow-2xl border-2 border-yellow-500" src="" alt="Kết quả Game">
        
        <p class="text-gray-400 text-center text-xs mt-3 px-6">
            (Nếu dùng máy tính, hãy Click chuột phải -> Save image as...)
        </p>

        <button id="close-modal-btn" class="mt-5 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-8 rounded-full shadow-lg transition-all">
            Đóng
        </button>
    </div>

    <script>
        function adjustScale() {
            const card = document.getElementById('game-card');
            const scale = Math.min(window.innerWidth / card.offsetWidth, window.innerHeight / card.offsetHeight, 1);
            card.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', adjustScale);
        window.addEventListener('load', adjustScale);

        const inputs = document.querySelectorAll('.letter-box');
        const mssvInput = document.getElementById('mssv-input');
        const messageEle = document.getElementById('message');
        const captureBtn = document.getElementById('capture-btn');
        const mssvText = document.getElementById('mssv-text');
        const mssvDisplay = document.getElementById('mssv-display');
        const titleEle = document.getElementById('title-ele');
        const titleContainer = document.getElementById('title-container');

        // Các biến cho Modal
        const resultModal = document.getElementById('result-modal');
        const resultImage = document.getElementById('result-image');
        const closeModalBtn = document.getElementById('close-modal-btn');

        function checkGame() {
            const currentWord = Array.from(inputs).map(i => i.value).join('');
            const mssvValue = mssvInput.value.trim();

            if (currentWord.length === 7) {
                if (currentWord === "TRANGAN") {
                    if (mssvValue.length < 10) {
                        messageEle.textContent = '⚠️ Hãy nhập đủ 10 số MSSV trước!';
                        messageEle.className = "mt-1 text-xs font-bold text-yellow-400 opacity-100";
                        captureBtn.classList.add('hidden');
                        if (mssvInput.classList.contains('hidden')) {
                            mssvDisplay.classList.add('hidden');
                            mssvInput.classList.remove('hidden');
                        }
                        mssvInput.focus();
                    } else {
                        messageEle.textContent = '🎉 Tuyệt vời! Bạn đã hoàn thành.';
                        messageEle.className = "mt-1 text-xs font-bold text-green-400 opacity-100";
                        inputs.forEach(i => i.classList.add('!bg-green-500', '!text-white'));
                        captureBtn.classList.remove('hidden');
                    }
                } else {
                    messageEle.textContent = '❌ Sai rồi, thử lại nhé!';
                    messageEle.className = "mt-1 text-xs font-bold text-red-400 opacity-100";
                    captureBtn.classList.add('hidden');
                }
            }
        }

        mssvInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (e.target.value.length === 10) {
                mssvInput.classList.add('hidden');
                mssvText.textContent = e.target.value;
                mssvDisplay.classList.remove('hidden');
                checkGame();
            }
        });

        mssvDisplay.addEventListener('click', () => {
            mssvDisplay.classList.add('hidden');
            mssvInput.classList.remove('hidden');
            mssvInput.focus();
            captureBtn.classList.add('hidden');
        });

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
                if (e.target.value && index < inputs.length - 1) inputs[index + 1].focus();
                checkGame();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
            });
        });

        // XỬ LÝ CHỤP VÀ HIỂN THỊ MODAL
        captureBtn.addEventListener('click', async () => {
            captureBtn.innerText = '⏳ Đang xử lý...';
            captureBtn.style.pointerEvents = 'none';
            
            const card = document.getElementById('game-card');
            const originalTransform = card.style.transform;
            
            const staticTitle = document.createElement('h1');
            staticTitle.innerHTML = 'Di sản UNESCO<br>Việt Nam';
            staticTitle.className = "font-serif-custom text-3xl sm:text-4xl font-bold text-yellow-300 drop-shadow-md leading-snug";
            
            titleEle.style.display = 'none';
            titleContainer.appendChild(staticTitle);

            card.style.transform = 'scale(1)';
            captureBtn.style.visibility = 'hidden';
            messageEle.style.visibility = 'hidden';

            await new Promise(r => setTimeout(r, 300));

            try {
                const isMobile = window.innerWidth < 768;
                const canvas = await html2canvas(card, {
                    useCORS: true,
                    scale: isMobile ? 2 : 2.5, 
                    backgroundColor: '#1a1a1a',
                    logging: false
                });

                // Chuyển canvas thành dạng Data URL để nhúng vào thẻ <img>
                const imageBase64 = canvas.toDataURL('image/png');
                
                // Gắn nguồn ảnh cho Modal và hiển thị Modal lên
                resultImage.src = imageBase64;
                resultModal.classList.remove('hidden');

            } catch (err) {
                alert('Có lỗi xảy ra khi xử lý ảnh. Vui lòng thử lại!');
                console.error(err);
            } finally {
                staticTitle.remove(); 
                titleEle.style.display = 'block'; 
                
                card.style.transform = originalTransform;
                captureBtn.style.visibility = 'visible';
                messageEle.style.visibility = 'visible';
                captureBtn.innerText = '📸 Nhận ảnh minh chứng';
                captureBtn.style.pointerEvents = 'auto';
            }
        });

        // Tắt Modal
        closeModalBtn.addEventListener('click', () => {
            resultModal.classList.add('hidden');
            resultImage.src = ''; // Dọn dẹp bộ nhớ
        });

        adjustScale();
    </script>
</body>
</html>
