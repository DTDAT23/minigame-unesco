<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigame: Di sản UNESCO Việt Nam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #1a1a1a; 
            background-image: radial-gradient(circle at center, #2a2a2a 0%, #111 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Tránh cuộn trang thừa trên mobile */
        }
        
        .font-serif-custom {
            font-family: 'Playfair Display', serif;
        }

        /* Khung viền vàng cổ kính - Giữ nguyên của bạn */
        .vintage-frame {
            border: 2px solid #D4AF37;
            outline: 1px solid #D4AF37;
            outline-offset: -6px;
            position: relative;
        }

        .vintage-frame::before, .vintage-frame::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid #D4AF37; z-index: 20;
        }
        .vintage-frame::before { top: 2px; left: 2px; border-right: none; border-bottom: none; }
        .vintage-frame::after { bottom: 2px; right: 2px; border-left: none; border-top: none; }

        .frame-inner::before, .frame-inner::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid #D4AF37; z-index: 20;
        }
        .frame-inner::before { top: 2px; right: 2px; border-left: none; border-bottom: none; }
        .frame-inner::after { bottom: 2px; left: 2px; border-right: none; border-top: none; }

        /* Kỹ xảo: Scale card để vừa màn hình */
        #game-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #game-card {
            transition: transform 0.2s ease-out;
            transform-origin: center center;
            flex-shrink: 0;
        }

        /* Giữ hiệu ứng ban đầu của bạn */
        input:focus::placeholder {
            color: transparent;
        }

        /* Fix lỗi iOS tự zoom input */
        input { font-size: 16px !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-card" class="relative w-full max-w-md aspect-[9/16] rounded-xl overflow-hidden shadow-2xl shadow-yellow-900/20 bg-[#1a1a1a]">
            
            <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 hover:scale-105" 
                 style="background-image: url('background.jpg');">
            </div>
            
            <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/40 to-black/80"></div>

            <div class="absolute inset-3 vintage-frame flex flex-col items-center justify-between p-6 text-center z-10">
                <div class="frame-inner w-full h-full absolute inset-0 pointer-events-none"></div>

                <div class="mt-4 w-full relative z-30 pt-4">
                    <h1 id="title-ele" class="font-serif-custom text-3xl sm:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-yellow-400 to-yellow-200 drop-shadow-md leading-snug">
                        Di sản UNESCO<br>Việt Nam
                    </h1>
                </div>

                <div class="text-3xl sm:text-4xl tracking-[0.4em] my-3 drop-shadow-2xl relative z-30 ml-[0.4em]">
                    🚣‍♂️🌄⛰️
                </div>

                <div class="bg-black/40 backdrop-blur-md border border-yellow-500/30 rounded-xl p-5 text-left text-sm text-gray-100 w-full max-w-[280px] shadow-xl relative z-30">
                    <ul class="space-y-3">
                        <li class="flex items-start gap-3"><span class="text-xl shrink-0">📍</span> <span class="pt-0.5">Ninh Bình</span></li>
                        <li class="flex items-start gap-3"><span class="text-xl shrink-0">📅</span> <span class="pt-0.5">Được UNESCO công nhận năm 2014</span></li>
                        <li class="flex items-start gap-3"><span class="text-xl shrink-0">🚣</span> <span class="pt-0.5">Nổi tiếng với du lịch chèo thuyền qua hang động</span></li>
                        <li class="flex items-start gap-3"><span class="text-xl shrink-0">🌿</span> <span class="pt-0.5 font-semibold text-yellow-300">Di sản hỗn hợp đầu tiên của Việt Nam</span></li>
                    </ul>
                </div>

                <div class="mb-4 w-full relative z-30 flex flex-col items-center">
                    <div class="h-10 mb-3 flex items-center justify-center">
                        <input type="text" id="mssv-input" maxlength="10" placeholder="Nhập MSSV của bạn" class="w-40 sm:w-48 bg-black/60 border border-yellow-500/50 rounded-lg py-1.5 px-3 text-center text-sm text-white placeholder-gray-400 focus:outline-none focus:border-yellow-400 transition-all shadow-inner tracking-wider" autocomplete="off">
                    </div>

                    <div class="flex flex-wrap justify-center gap-1.5 mb-2" id="letter-inputs">
                        <div class="flex gap-1">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                        </div>
                        <div class="flex gap-1">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                            <input type="text" maxlength="1" class="letter-box w-9 h-11 bg-white border-2 border-gray-900 rounded-lg text-center text-xl font-bold text-black uppercase focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500 shadow-lg">
                        </div>
                    </div>
                    
                    <p id="message" class="mt-1 text-xs font-bold min-h-[16px] transition-all opacity-0"></p>

                    <button id="capture-btn" class="hidden mt-2 bg-gradient-to-r from-yellow-600 to-yellow-500 active:scale-95 text-black font-bold py-1.5 px-4 rounded-full shadow-lg text-sm transition-all flex items-center gap-2 mb-4">
                        📸 Tải ảnh minh chứng
                    </button>
                </div>

                <div id="mssv-display" class="hidden absolute bottom-6 right-6 z-50 cursor-pointer">
                    <span id="mssv-text" class="text-white text-xs font-bold tracking-widest" style="text-shadow: 2px 2px 4px #000;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KỸ XẢO TỰ ĐỘNG THU NHỎ (SCALE) ĐỂ VỪA KHÍT MÀN HÌNH
        function adjustScale() {
            const card = document.getElementById('game-card');
            const wrapper = document.getElementById('game-wrapper');
            
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            
            // Lấy kích thước gốc của card trên laptop
            const cardW = card.offsetWidth;
            const cardH = card.offsetHeight;

            // Tính toán tỷ lệ scale nhỏ nhất để không bị cắt cả chiều rộng lẫn chiều cao
            // Chúng ta scale toàn bộ card như một tấm ảnh để giữ nguyên giao diện 100%
            const scale = Math.min(winW / cardW, winH / cardH, 1);
            
            card.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', adjustScale);
        window.addEventListener('load', adjustScale);

        // PHẦN LOGIC GAME CŨ (GIỮ NGUYÊN)
        function removeAccents(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.letter-box');
            const expectedAnswer = "TRANGAN";
            const messageEle = document.getElementById('message');
            const mssvInput = document.getElementById('mssv-input'); 
            const mssvDisplay = document.getElementById('mssv-display');
            const mssvText = document.getElementById('mssv-text');
            const captureBtn = document.getElementById('capture-btn');
            const gameCard = document.getElementById('game-card');
            const titleEle = document.getElementById('title-ele');

            function checkBoxes() {
                let currentWord = Array.from(inputs).map(inp => inp.value).join('');
                let mssvValue = mssvInput.value.trim();
                
                if (currentWord.length === inputs.length) {
                    if (currentWord === expectedAnswer) {
                        if (mssvValue.length < 10) {
                            messageEle.textContent = '⚠️ Vui lòng nhập đủ 10 số MSSV!';
                            messageEle.className = "mt-1 text-xs font-bold text-yellow-400 opacity-100 animate-pulse";
                            mssvInput.focus();
                            return; 
                        }
                        messageEle.textContent = '🎉 Tuyệt vời! Bạn đã trả lời đúng!';
                        messageEle.className = "mt-1 text-xs font-bold text-green-400 opacity-100";
                        inputs.forEach(i => i.classList.add('!bg-green-500', '!text-white', '!border-green-600'));
                        captureBtn.classList.remove('hidden'); 
                    } else {
                        messageEle.textContent = '❌ Sai rồi, thử lại nhé!';
                        messageEle.className = "mt-1 text-xs font-bold text-red-400 opacity-100";
                    }
                }
            }

            mssvInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value.length === 10) {
                    mssvInput.classList.add('hidden');
                    mssvText.textContent = e.target.value;
                    mssvDisplay.classList.remove('hidden');
                    checkBoxes();
                }
            });

            mssvDisplay.addEventListener('click', () => {
                mssvDisplay.classList.add('hidden');
                mssvInput.classList.remove('hidden');
                mssvInput.focus();
            });

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value) {
                        e.target.value = removeAccents(e.target.value).toUpperCase();
                        if (index < inputs.length - 1) inputs[index + 1].focus();
                        else checkBoxes();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
                });
            });

            captureBtn.addEventListener('click', () => {
                captureBtn.style.display = 'none';
                messageEle.style.display = 'none';
                const originalTitleClass = titleEle.className;
                titleEle.className = "font-serif-custom text-3xl sm:text-4xl font-bold text-yellow-400 drop-shadow-md";

                html2canvas(gameCard, {
                    useCORS: true, 
                    scale: 3, 
                    backgroundColor: '#1a1a1a'
                }).then(canvas => {
                    titleEle.className = originalTitleClass;
                    captureBtn.style.display = 'flex';
                    messageEle.style.display = 'block';
                    const link = document.createElement('a');
                    link.download = `UNESCO_${mssvText.textContent}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            });
            
            adjustScale(); // Chạy scale lần đầu
        });
    </script>
</body>
</html>
